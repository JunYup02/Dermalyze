<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dermalyze — Nearby dermatologists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-frame">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" data-nav-back="dashboard.html" aria-label="Go back">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <span class="topbar-title">Clinics</span>
      </div>
      <button class="avatar-btn" data-account-btn aria-label="Account">
        <span class="material-symbols-outlined">account_circle</span>
      </button>
    </header>

    <main class="screen">
      <div id="urgent-banner" class="card hidden" style="border: none; display:flex; gap:12px; align-items:flex-start;">
        <span class="material-symbols-outlined" id="urgent-banner-icon">emergency</span>
        <div>
          <p class="text-label-md" id="urgent-banner-eyebrow" style="margin:0 0 2px; text-transform:uppercase;">Attention needed</p>
          <p style="margin:0 0 4px; font-weight:700;" id="urgent-banner-title">—</p>
          <p style="margin:0; font-size:13px;" id="urgent-banner-sub">We recommend seeing a dermatologist soon.</p>
        </div>
      </div>

      <div>
        <h1 class="text-headline-sm" style="margin:0 0 4px;">Find a dermatologist near you</h1>
        <p class="text-body-md text-outline" id="location-label" style="margin:0;">Using your current location</p>
      </div>

      <div class="search-input-wrap">
        <span class="material-symbols-outlined">search</span>
        <input type="text" id="search-input" placeholder="Filter results by name…">
      </div>

      <div class="filter-row">
        <button type="button" class="filter-chip active" data-radius="3000">3 km</button>
        <button type="button" class="filter-chip" data-radius="1500">1.5 km</button>
        <button type="button" class="filter-chip" data-radius="7000">7 km</button>
        <button type="button" class="filter-chip" data-radius="10000">10 km</button>
        <button type="button" class="filter-chip" id="open-now-chip">
          <span class="material-symbols-outlined" style="font-size:14px;">schedule</span>
          Open now
        </button>
        <button type="button" class="filter-chip" id="top-rated-chip">
          <span class="material-symbols-outlined" style="font-size:14px;">star</span>
          Top rated
        </button>
      </div>

      <div id="map-frame" class="map-frame hidden"></div>

      <div id="location-banner" class="banner banner-error hidden">
        <span class="material-symbols-outlined">location_off</span>
        <span></span>
      </div>

      <div id="clinics-state" class="state-panel">
        <div class="spinner" style="border-color: color-mix(in srgb, var(--outline) 30%, transparent); border-top-color: var(--outline);"></div>
        <p>Getting your location…</p>
      </div>

      <div id="clinics-list" style="display:flex; flex-direction:column; gap:12px;"></div>
    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="label">Dashboard</span>
      </a>
      <a class="nav-item active" href="hospitals.html">
        <span class="material-symbols-outlined">medical_services</span>
        <span class="label">Clinics</span>
      </a>
      <a class="nav-item" href="support.html">
        <span class="material-symbols-outlined">help_center</span>
        <span class="label">Support</span>
      </a>
    </nav>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/hospitals.js"></script>
</body>
</html>
